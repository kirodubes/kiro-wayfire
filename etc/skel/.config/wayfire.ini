## ════════════════════════════════════════════════════════════════════════
## Kiro wayfire baseline config  (wayfire.ini)
## ════════════════════════════════════════════════════════════════════════
## Target: wayfire 0.10.x (Arch `extra`). Lives at: ~/.config/wayfire.ini
##
## Kiro's "3D effects" Wayland edition. Ports kiro-hyprland's look & feel — same
## SUPER keybind grammar, same Kiro app launchers (CTRL+ALT + SUPER+F1..F12),
## waybar + mako + swaybg shell, hyprlock/hypridle lock pipeline — onto wayfire's
## plugin + [command] model. The signature cube/expo/wobbly/wrot/zoom effects are
## core plugins (no extra packages).
##
## Colours ship as Tokyo Night defaults; ~/.config/wayfire/scripts/set-theme.sh
## (pywal) rewrites the [core] background_color and [decoration] colour lines from
## the wallpaper at login. wayfire watches this file and live-reloads on change.
##
## Window-management chords follow wayfire's plugin vocabulary (simple-tile / grid
## / vswitch / wm-actions) — not a 1:1 copy of Hyprland's dispatchers. The shipped
## keybindings.txt is the source of truth shown by kiro-keybindings.
## Reference: https://github.com/WayfireWM/wayfire/wiki/Configuration
## ────────────────────────────────────────────────────────────────────────

[core]
# cube is loaded but bound to a deliberate gesture (showcase, not the everyday
# switcher — that is vswitch). wobbly/zoom/wrot/expo/blur are the daily effects.
plugins = \
  alpha \
  animate \
  autostart \
  blur \
  command \
  cube \
  decoration \
  expo \
  fast-switcher \
  grid \
  idle \
  invert \
  move \
  oswitch \
  place \
  preserve-output \
  resize \
  scale \
  session-lock \
  simple-tile \
  switcher \
  vswipe \
  vswitch \
  window-rules \
  wm-actions \
  wobbly \
  workarounds \
  wrot \
  zoom

# Tokyo Night base (#1a1b26). Overwritten at runtime by set-theme.sh (pywal).
background_color = 0.102 0.106 0.149 1.0
close_top_view = <super> KEY_Q | <super> <shift> KEY_Q | <alt> KEY_F4
preferred_decoration_mode = server
# 3 × 3 grid = 9 workspaces (wayfire's idiomatic viewport model; SUPER+1..9).
vwidth = 3
vheight = 3
xwayland = true
max_render_time = -1
focus_buttons = BTN_LEFT | BTN_RIGHT | BTN_MIDDLE
focus_button_with_modifiers = false
focus_buttons_passthrough = true

## Input ──────────────────────────────────────────────────────────────────────
[input]
xkb_layout = be,us
xkb_options = compose:caps
kb_repeat_delay = 600
kb_repeat_rate = 40
kb_numlock_default_state = true
kb_capslock_default_state = false
tap_to_click = true
natural_scroll = true
disable_touchpad_while_typing = true
cursor_theme = Bibata-Modern-Ice
cursor_size = 24

## Output ─────────────────────────────────────────────────────────────────────
[output]
mode = auto
position = auto
scale = 1.000000
transform = normal

## ── Autostart ────────────────────────────────────────────────────────────────
## Each entry is `name = command`, run through /bin/sh -c (pipes / [ ] / && work,
## unlike Hyprland's exec_cmd). wf-shell is off — waybar is the bar.
[autostart]
autostart_wf_shell = false
polkit       = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
dbus         = dbus-update-activation-environment --systemd --all
import_env   = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
# This config does not process /etc/xdg/autostart, so XDG-autostart-only items are
# added by hand. Creates Documents/Music/Pictures/… on first login (idempotent).
xdg_dirs     = xdg-user-dirs-update
gsettings    = ~/.config/wayfire/scripts/import-gsettings.sh
wallpaper    = swaybg -m fill -i ~/.config/wayfire/bg/kiro.jpg
# pywal: derive the palette from the wallpaper and fan it out to waybar/mako/borders.
theme        = ~/.config/wayfire/scripts/set-theme.sh
panel        = waybar
notifications = mako
idle         = hypridle
nm           = nm-applet --indicator
portal       = /usr/libexec/xdg-desktop-portal
# Live ISO only: auto-launch the installer. kiro_final strips this line on install.
installer    = sh -c '[ -d /run/archiso/bootmnt ] && calamares_polkit -d -style kvantum'

## ── Look & feel ──────────────────────────────────────────────────────────────
# Thin server-side borders, no titlebar (Hyprland feel). active_color is the Kiro
# blue accent (#7aa2f7); both colour lines are rewritten by set-theme.sh (pywal).
[decoration]
active_color = 0.478 0.635 0.969 0.667
inactive_color = 0.255 0.282 0.408 0.667
border_size = 2
button_order = minimize maximize close
font = JetBrainsMono Nerd Font
title_height = 0
ignore_views = none

[blur]
blur_by_default = type is "toplevel"
method = kawase
kawase_degrade = 1
kawase_iterations = 2
kawase_offset = 5
mode = normal
toggle = <super> <alt> KEY_B

# Per-window opacity: hold SUPER+ALT and scroll.
[alpha]
modifier = <super> <alt>
min_value = 0.1

[animate]
open_animation = zoom
close_animation = fade
duration = 300
startup_duration = 600

[wobbly]
friction = 3.0
spring_k = 8.0
grid_resolution = 6

## ── Tiling (simple-tile — the wayfire analogue of Hyprland's master layout) ───
[simple-tile]
tile_by_default = all
button_move = <super> BTN_LEFT
button_resize = <super> BTN_RIGHT
key_focus_left = <super> KEY_LEFT
key_focus_right = <super> KEY_RIGHT
key_focus_above = <super> KEY_UP
key_focus_below = <super> KEY_DOWN
# Toggle the focused window between tiled and floating (Hyprland: SUPER+SHIFT+Space).
key_toggle = <super> <shift> KEY_SPACE
keep_fullscreen_on_adjacent = true
inner_gap_size = 5
outer_horiz_gap_size = 7
outer_vert_gap_size = 7

# Snap windows to halves/quarters/center (Hyprland-style placement).
[grid]
slot_l = <super> KEY_KP4
slot_r = <super> KEY_KP6
slot_c = <super> KEY_KP5
slot_t = <super> KEY_KP8
slot_b = <super> KEY_KP2
slot_tl = <super> KEY_KP7
slot_tr = <super> KEY_KP9
slot_bl = <super> KEY_KP1
slot_br = <super> KEY_KP3
restore = <super> KEY_KP0
duration = 300
type = crossfade

[move]
activate = <super> BTN_LEFT
enable_snap = true
enable_snap_off = true
snap_threshold = 10
snap_off_threshold = 10
join_views = false

[resize]
activate = <super> BTN_RIGHT

[place]
mode = center

[wm-actions]
toggle_fullscreen = <super> KEY_F
toggle_maximize = <super> <alt> KEY_F
toggle_always_on_top = <super> <shift> KEY_A
toggle_sticky = <super> <shift> KEY_S
minimize = <super> <shift> KEY_N

## ── Workspaces (vswitch grid — SUPER+1..9, the everyday switcher) ─────────────
[vswitch]
duration = 300
gap = 20
background = 0.102 0.106 0.149 1.0
wraparound = false
# Switch to workspace N
binding_1 = <super> KEY_1
binding_2 = <super> KEY_2
binding_3 = <super> KEY_3
binding_4 = <super> KEY_4
binding_5 = <super> KEY_5
binding_6 = <super> KEY_6
binding_7 = <super> KEY_7
binding_8 = <super> KEY_8
binding_9 = <super> KEY_9
# Move the focused window to workspace N (Hyprland: SUPER+CTRL+1..9)
send_win_1 = <super> <ctrl> KEY_1
send_win_2 = <super> <ctrl> KEY_2
send_win_3 = <super> <ctrl> KEY_3
send_win_4 = <super> <ctrl> KEY_4
send_win_5 = <super> <ctrl> KEY_5
send_win_6 = <super> <ctrl> KEY_6
send_win_7 = <super> <ctrl> KEY_7
send_win_8 = <super> <ctrl> KEY_8
send_win_9 = <super> <ctrl> KEY_9
# Carry the focused window with you to workspace N (Hyprland: SUPER+SHIFT+1..9)
with_win_1 = <super> <shift> KEY_1
with_win_2 = <super> <shift> KEY_2
with_win_3 = <super> <shift> KEY_3
with_win_4 = <super> <shift> KEY_4
with_win_5 = <super> <shift> KEY_5
with_win_6 = <super> <shift> KEY_6
with_win_7 = <super> <shift> KEY_7
with_win_8 = <super> <shift> KEY_8
with_win_9 = <super> <shift> KEY_9
# Directional workspace switching
binding_left = <super> <ctrl> KEY_LEFT
binding_right = <super> <ctrl> KEY_RIGHT
binding_up = <super> <ctrl> KEY_UP
binding_down = <super> <ctrl> KEY_DOWN

# Touchpad workspace swipe (Hyprland's workspace_swipe analogue).
[vswipe]
enable_horizontal = true
enable_vertical = false
fingers = 3
duration = 180

## ── Effects: overview / scale / zoom / rotate / fisheye / invert ──────────────
# expo = workspace overview (tap SUPER); SUPER+1..9 select while open.
[expo]
toggle = <super>
duration = 300
offset = 10.0
background = 0.102 0.106 0.149 1.0
select_workspace_1 = KEY_1
select_workspace_2 = KEY_2
select_workspace_3 = KEY_3
select_workspace_4 = KEY_4
select_workspace_5 = KEY_5
select_workspace_6 = KEY_6
select_workspace_7 = KEY_7
select_workspace_8 = KEY_8
select_workspace_9 = KEY_9

# scale = expose-style window overview (SUPER+S).
[scale]
toggle = <super> KEY_S
spacing = 50
duration = 300
inactive_alpha = 0.85
allow_zoom = true
middle_click_close = true

# Desktop magnifier: SUPER + scroll.
[zoom]
modifier = <super>
smoothing_duration = 300
speed = 0.01

# Rotate a window: SUPER+CTRL + right-drag (showcase).
[wrot]
activate = <super> <ctrl> BTN_RIGHT
reset = <super> <ctrl> KEY_R

# Fisheye lens (showcase toggle).
[fisheye]
toggle = <super> <ctrl> KEY_F
radius = 450.0
zoom = 7.0

# Invert output colours (accessibility / showcase).
[invert]
toggle = <super> <ctrl> KEY_I

## ── The 3D cube — the edition's signature, kept as a deliberate showcase ──────
## NOT the everyday workspace switcher (that is vswitch). Activate by holding
## CTRL+ALT and dragging with the left mouse button, then rotate with the arrows.
[cube]
activate = <ctrl> <alt> BTN_LEFT
rotate_left = <ctrl> <alt> KEY_LEFT
rotate_right = <ctrl> <alt> KEY_RIGHT
background = 0.102 0.106 0.149 1.0
background_mode = simple
light = true
initial_animation = 350
speed_spin_horiz = 0.02
speed_spin_vert = 0.02
speed_zoom = 0.07
zoom = 0.1

## ── Window switching ─────────────────────────────────────────────────────────
# ALT+TAB classic switcher (Hyprland feel) + SUPER+TAB fast-switcher.
[switcher]
next_view = <alt> KEY_TAB
prev_view = <alt> <shift> KEY_TAB
speed = 300

[fast-switcher]
activate = <super> KEY_TAB
activate_backward = <super> <shift> KEY_TAB

# Move focus to the next/previous output (multi-monitor). SUPER+O is the colour
# picker, so oswitch lives on SUPER+CTRL+O.
[oswitch]
next_output = <super> <ctrl> KEY_O
next_output_with_win = <super> <ctrl> <shift> KEY_O

[idle]
# hypridle drives lock/dpms; keep the in-compositor screensaver/dpms off.
toggle = none
screensaver_timeout = -1
dpms_timeout = -1
disable_on_fullscreen = true

## ── Commands: app launchers, session, media, screenshots ─────────────────────
## App launches + session actions live here; window-management chords live in the
## plugin sections above. Commands run through /bin/sh -c.
[command]
# -- Terminal / core apps --
binding_terminal = <super> KEY_ENTER | <super> KEY_T | <ctrl> <alt> KEY_ENTER | <ctrl> <alt> KEY_T
command_terminal = alacritty
binding_files = <super> <shift> KEY_ENTER
command_files = thunar
binding_editor = <super> KEY_E
command_editor = code
binding_volume = <super> KEY_V | <ctrl> <alt> KEY_U
command_volume = pavucontrol
binding_colorpicker = <super> KEY_O
command_colorpicker = hyprpicker -a

# -- Rofi --
binding_drun = <super> KEY_D | <super> KEY_SPACE
command_drun = rofi -show drun
binding_run = <super> <shift> KEY_D
command_run = rofi -show run
binding_theme = <super> KEY_R | <alt> KEY_R
command_theme = rofi-theme-selector

# -- Session --
binding_logout = <super> KEY_X | <ctrl> <alt> KEY_K
command_logout = archlinux-logout
binding_powermenu = <super> <shift> KEY_X
command_powermenu = kiro-powermenu
binding_logout_settings = <ctrl> <alt> KEY_L
command_logout_settings = archlinux-logout --settings
binding_keybindings = <super> <ctrl> KEY_S
command_keybindings = kiro-keybindings
binding_lockwall = <ctrl> <alt> KEY_R
command_lockwall = archlinux-betterlockscreen
binding_reload = <super> <shift> KEY_R
command_reload = sh -c 'makoctl reload; pkill -SIGUSR2 waybar'

# -- CTRL+ALT app launchers (Kiro scheme) --
binding_tt_alacritty = <ctrl> <alt> KEY_A | <ctrl> <alt> KEY_Q
command_tt_alacritty = alacritty-tweak-tool
binding_brave = <ctrl> <alt> KEY_B
command_brave = brave --password-store=basic
binding_chromium = <ctrl> <alt> KEY_C | <ctrl> <alt> KEY_G
command_chromium = chromium -no-default-browser-check
binding_obs = <ctrl> <alt> KEY_D
command_obs = obs
binding_att = <ctrl> <alt> KEY_E
command_att = archlinux-tweak-tool
binding_firefox = <ctrl> <alt> KEY_F
command_firefox = firefox
binding_isobuilder = <ctrl> <alt> KEY_I
command_isobuilder = kiro-iso-builder
binding_usbwriter = <ctrl> <alt> KEY_M
command_usbwriter = mintstick -m iso
binding_opera = <ctrl> <alt> KEY_O
command_opera = opera
binding_pamac = <ctrl> <alt> KEY_P
command_pamac = pamac-manager
binding_tt_fish = <ctrl> <alt> KEY_S
command_tt_fish = fish-tweak-tool
binding_vivaldi = <ctrl> <alt> KEY_V
command_vivaldi = vivaldi-stable
binding_tt_fastfetch = <ctrl> <alt> KEY_W | <ctrl> <alt> KEY_Z
command_tt_fastfetch = fastfetch-tweak-tool
binding_btop = <ctrl> <alt> KEY_END | <ctrl> <shift> KEY_ESC
command_btop = alacritty --class btop -e btop

# -- SUPER + F1..F12 app keys (Kiro scheme) --
binding_f1 = <super> KEY_F1
command_f1 = firefox
binding_f2 = <super> KEY_F2
command_f2 = code
binding_f3 = <super> KEY_F3
command_f3 = inkscape
binding_f4 = <super> KEY_F4
command_f4 = gimp
binding_f5 = <super> KEY_F5
command_f5 = meld
binding_f6 = <super> KEY_F6
command_f6 = vlc
binding_f7 = <super> KEY_F7
command_f7 = virtualbox
binding_f8 = <super> KEY_F8
command_f8 = thunar
binding_f9 = <super> KEY_F9
command_f9 = virt-manager
binding_f10 = <super> KEY_F10
command_f10 = spotify
binding_f11 = <super> KEY_F11 | <super> KEY_F12
command_f11 = rofi -show drun

# -- Media & brightness (repeatable where it makes sense) --
repeatable_binding_volume_up = KEY_VOLUMEUP
command_volume_up = wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
repeatable_binding_volume_down = KEY_VOLUMEDOWN
command_volume_down = wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
binding_mute = KEY_MUTE
command_mute = wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
binding_play = KEY_PLAYPAUSE
command_play = playerctl play-pause
binding_next = KEY_NEXTSONG
command_next = playerctl next
binding_prev = KEY_PREVIOUSSONG
command_prev = playerctl previous
repeatable_binding_light_up = KEY_BRIGHTNESSUP
command_light_up = brightnessctl set 5%+
repeatable_binding_light_down = KEY_BRIGHTNESSDOWN
command_light_down = brightnessctl set 5%-

# -- Screenshots (grim + slurp → clipboard) --
binding_screenshot_region = KEY_PRINT
command_screenshot_region = grim -g "$(slurp)" - | wl-copy
binding_screenshot_screen = <super> KEY_PRINT
command_screenshot_screen = grim - | wl-copy

## ── Window rules ─────────────────────────────────────────────────────────────
[window-rules]
# Transparent terminal (Hyprland shipped 0.90). wayfire's blur frosts it.
alpha_alacritty = on created if app_id is "Alacritty" then set alpha 0.9
# Keep Spotify tiled like every other window.
tile_spotify = on created if app_id is "Spotify" then tile

[workarounds]
app_id_mode = stock
all_dialogs_modal = true
discard_command_output = true
